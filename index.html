<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#003366" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Techno One - Sales Offer Generator</title>
    <!-- Bitrix24 JS SDK: safe HTTPS protocol -->
    <script src="https://api.bitrix24.com/api/v1/" async></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Inter:wght@300;400;500;600;700;800;900&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body class="bg-slate-100 text-slate-800 antialiased min-h-screen">
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>

    <!-- Register PWA Service Worker for Offline Mode -->
    <script>
      if ('serviceWorker' in navigator && window.location.protocol.startsWith('http')) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('[PWA] Service Worker registered:', reg.scope))
            .catch(err => console.log('[PWA] Service Worker registration failed:', err));
        });
      }
    </script>
  </body>
</html>
